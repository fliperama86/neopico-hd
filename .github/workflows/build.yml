name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  # Group by REF, not SHA: a tag push and a branch push at the same commit
  # must not cancel each other (this repeatedly cancelled tag release runs).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

    - name: Setup Pico SDK
      run: |
        git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
        cd $HOME/pico-sdk
        git submodule update --init

    # Three firmware artifacts, identical flags, varying ONLY by resolution.
    # The common config (RT path + OSD + self-test + root menu) is the project
    # default, so each build passes only its resolution flag. 720p auto-forces
    # COPY_TO_RAM (372 MHz overclock would corrupt XIP flash); see CMakeLists.

    - name: Build NeoPico-HD 480p
      run: |
        cmake -S . -B build-480p -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release
        cmake --build build-480p -j$(nproc)
        cp build-480p/src/neopico_hd.uf2 neopico_hd_480p.uf2
        cp build-480p/src/neopico_hd.elf neopico_hd_480p.elf

    - name: Build NeoPico-HD 240p
      run: |
        cmake -S . -B build-240p -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release -DNEOPICO_VIDEO_240P=ON
        cmake --build build-240p -j$(nproc)
        cp build-240p/src/neopico_hd.uf2 neopico_hd_240p.uf2
        cp build-240p/src/neopico_hd.elf neopico_hd_240p.elf

    - name: Build NeoPico-HD 720p
      run: |
        cmake -S . -B build-720p -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release -DNEOPICO_VIDEO_720P=ON
        cmake --build build-720p -j$(nproc)
        cp build-720p/src/neopico_hd.uf2 neopico_hd_720p.uf2
        cp build-720p/src/neopico_hd.elf neopico_hd_720p.elf

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: neopico-hd-build
        path: |
          neopico_hd_240p.uf2
          neopico_hd_240p.elf
          neopico_hd_480p.uf2
          neopico_hd_480p.elf
          neopico_hd_720p.uf2
          neopico_hd_720p.elf

  fabrication:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - name: neopico-hd
            pcb: hardware/neopico-hd/neopico-hd.kicad_pcb
            sch: hardware/neopico-hd/neopico-hd.kicad_sch
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run KiBot
      uses: INTI-CMNB/KiBot@v2_k9
      with:
        config: hardware/kibot-jlcpcb.yml
        board: ${{ matrix.board.pcb }}
        schema: ${{ matrix.board.sch }}
        dir: output

    - name: Upload Fabrication Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.board.name }}-jlcpcb
        path: |
          output/gerbers.zip
          output/bom.csv
          output/pos.csv

  release:
    needs: [build, fabrication]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: neopico-hd-build
        path: build-artifacts

    - name: Download Fabrication Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-jlcpcb'
        path: fab-artifacts

    - name: Prepare Release Files
      run: |
        mkdir -p release-files
        find build-artifacts \( -name '*.uf2' -o -name '*.elf' \) | xargs -I{} cp {} release-files/
        for board in fab-artifacts/*/; do
          name=$(basename "$board")
          cd "$board"
          zip -r "../../release-files/${name}.zip" .
          cd -
        done

    - name: Determine release version
      id: version
      run: |
        echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        echo "Using manual tag: ${{ github.ref_name }}"

    - name: Generate changelog
      run: |
        # Find the previous tag (second most recent, or empty if none)
        PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
        CURRENT_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
        if [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
          PREV_TAG=""
        fi
        if [ -n "$PREV_TAG" ]; then
          CHANGELOG=$(git log "${PREV_TAG}"..HEAD --pretty=format:"- %s (%h)")
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)")
        fi
        echo "$CHANGELOG" > /tmp/changelog.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        body_path: /tmp/changelog.txt
        files: release-files/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
