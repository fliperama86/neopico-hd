name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  # Group by REF, not SHA: a tag push and a branch push at the same commit
  # must not cancel each other (this repeatedly cancelled tag release runs).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [mvs, snes]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

    - name: Setup Pico SDK
      run: |
        git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
        cd $HOME/pico-sdk
        git submodule update --init

    # Single baseline firmware: the resolution selector. One build switches
    # between 240p / 480p / 720p live from the OSD menu (reboot-based). The
    # selector is the project default, so the no-arg build is the selector;
    # 480p runs at 252 MHz and 720p at 372 MHz, so COPY_TO_RAM auto-forces
    # (the overclock would corrupt XIP flash); see CMakeLists.

    - name: Build NeoPico-HD
      run: |
        cmake -S . -B build -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release -DNEOPICO_CAPTURE_TARGET=${{ matrix.target }}
        cmake --build build -j$(nproc)
        cp build/src/neopico_hd.uf2 neopico_hd_${{ matrix.target }}.uf2
        cp build/src/neopico_hd.elf neopico_hd_${{ matrix.target }}.elf

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: neopico-hd-${{ matrix.target }}-build
        path: |
          neopico_hd_${{ matrix.target }}.uf2
          neopico_hd_${{ matrix.target }}.elf

  fabrication:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - name: neopico-hd
            pcb: hardware/neopico-hd/neopico-hd.kicad_pcb
            sch: hardware/neopico-hd/neopico-hd.kicad_sch
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run KiBot
      uses: INTI-CMNB/KiBot@v2_k9
      with:
        config: hardware/kibot-jlcpcb.yml
        board: ${{ matrix.board.pcb }}
        schema: ${{ matrix.board.sch }}
        dir: output

    - name: Upload Fabrication Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.board.name }}-jlcpcb
        path: |
          output/gerbers.zip
          output/bom.csv
          output/pos.csv

  release:
    needs: [build, fabrication]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: 'neopico-hd-*-build'
        path: build-artifacts
        merge-multiple: true

    - name: Download Fabrication Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-jlcpcb'
        path: fab-artifacts

    - name: Prepare Release Files
      run: |
        mkdir -p release-files
        find build-artifacts \( -name '*.uf2' -o -name '*.elf' \) | xargs -I{} cp {} release-files/
        for board in fab-artifacts/*/; do
          name=$(basename "$board")
          cd "$board"
          zip -r "../../release-files/${name}.zip" .
          cd -
        done

    - name: Determine release version
      id: version
      run: |
        echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        echo "Using manual tag: ${{ github.ref_name }}"

    - name: Generate changelog
      run: |
        # Find the previous tag (second most recent, or empty if none)
        PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
        CURRENT_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
        if [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
          PREV_TAG=""
        fi
        if [ -n "$PREV_TAG" ]; then
          CHANGELOG=$(git log "${PREV_TAG}"..HEAD --pretty=format:"- %s (%h)")
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)")
        fi
        echo "$CHANGELOG" > /tmp/changelog.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        body_path: /tmp/changelog.txt
        files: release-files/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
