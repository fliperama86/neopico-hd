name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

    - name: Setup Pico SDK
      run: |
        git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
        cd $HOME/pico-sdk
        git submodule update --init

    - name: Build NeoPico-HD (MV1C digital audio)
      run: |
        mkdir build
        cd build
        cmake .. -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Build NeoPico-HD (PCM1802 analog audio)
      run: |
        mkdir build-pcm1802
        cd build-pcm1802
        cmake .. -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release -DNEOPICO_AUDIO_PCM1802=ON
        make -j$(nproc)
        # Rename to distinguish from default build
        cp src/neopico_hd.uf2 src/neopico_hd_pcm1802.uf2
        cp src/neopico_hd.elf src/neopico_hd_pcm1802.elf

    - name: Build NeoPico-HD (240p mode)
      run: |
        mkdir build-240p
        cd build-240p
        cmake .. -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release -DNEOPICO_VIDEO_240P=ON
        make -j$(nproc)
        # Rename to distinguish from default build
        cp src/neopico_hd.uf2 src/neopico_hd_240p.uf2
        cp src/neopico_hd.elf src/neopico_hd_240p.elf

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: neopico-hd-build
        path: |
          build/src/*.uf2
          build/src/*.elf
          build-pcm1802/src/neopico_hd_pcm1802.uf2
          build-pcm1802/src/neopico_hd_pcm1802.elf
          build-240p/src/neopico_hd_240p.uf2
          build-240p/src/neopico_hd_240p.elf

  fabrication:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - name: neopico-hd
            pcb: hardware/neopico-hd/neopico-hd.kicad_pcb
            sch: hardware/neopico-hd/neopico-hd.kicad_sch
          - name: pico-retrodigital
            pcb: hardware/pico-retrodigital/pico-retrodigital.kicad_pcb
            sch: hardware/pico-retrodigital/pico-retrodigital.kicad_sch
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run KiBot
      uses: INTI-CMNB/KiBot@v2_k9
      with:
        config: hardware/kibot-jlcpcb.yml
        board: ${{ matrix.board.pcb }}
        schema: ${{ matrix.board.sch }}
        dir: output

    - name: Upload Fabrication Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.board.name }}-jlcpcb
        path: |
          output/gerbers.zip
          output/bom.csv
          output/pos.csv

  release:
    needs: [build, fabrication]
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: neopico-hd-build
        path: build-artifacts

    - name: Download Fabrication Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-jlcpcb'
        path: fab-artifacts

    - name: Prepare Release Files
      run: |
        mkdir -p release-files
        find build-artifacts \( -name '*.uf2' -o -name '*.elf' \) | xargs -I{} cp {} release-files/
        for board in fab-artifacts/*/; do
          name=$(basename "$board")
          cd "$board"
          zip -r "../../release-files/${name}.zip" .
          cd -
        done

    - name: Determine release version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          # Manual tag push — use that tag as-is
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "Using manual tag: ${{ github.ref_name }}"
        else
          # Main branch push — auto-bump patch version from latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          # Extract major.minor.patch
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Auto-bumped: $LATEST_TAG -> $NEW_TAG"
        fi

    - name: Generate changelog
      run: |
        # Find the previous tag (second most recent, or empty if none)
        PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
        CURRENT_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
        if [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
          PREV_TAG=""
        fi
        if [ -n "$PREV_TAG" ]; then
          CHANGELOG=$(git log "${PREV_TAG}"..HEAD --pretty=format:"- %s (%h)")
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)")
        fi
        echo "$CHANGELOG" > /tmp/changelog.txt

    - name: Create tag (auto-bump)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        body_path: /tmp/changelog.txt
        files: release-files/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
