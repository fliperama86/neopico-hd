name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

    - name: Setup Pico SDK
      run: |
        git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
        cd $HOME/pico-sdk
        git submodule update --init

    - name: Build NeoPico-HD
      run: |
        mkdir build
        cd build
        cmake .. -DPICO_SDK_PATH=$HOME/pico-sdk -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: neopico-hd-build
        path: |
          build/src/*.uf2
          build/src/*.elf

  fabrication:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - name: neopico-hd
            pcb: hardware/neopico-hd/neopico-hd.kicad_pcb
            sch: hardware/neopico-hd/neopico-hd.kicad_sch
          - name: pico-retrodigital
            pcb: hardware/pico-retrodigital/pico-retrodigital.kicad_pcb
            sch: hardware/pico-retrodigital/pico-retrodigital.kicad_sch
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run KiBot
      uses: INTI-CMNB/KiBot@v2_k9
      with:
        config: hardware/kibot-jlcpcb.yml
        board: ${{ matrix.board.pcb }}
        schema: ${{ matrix.board.sch }}
        dir: output

    - name: Upload Fabrication Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.board.name }}-jlcpcb
        path: |
          output/gerbers.zip
          output/bom.csv
          output/pos.csv

  release:
    needs: [build, fabrication]
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: neopico-hd-build
        path: build-artifacts

    - name: Download Fabrication Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-jlcpcb'
        path: fab-artifacts

    - name: Prepare Release Files
      run: |
        mkdir -p release
        cp build-artifacts/*.uf2 build-artifacts/*.elf release/
        for board in fab-artifacts/*/; do
          name=$(basename "$board")
          cd "$board"
          zip -r "../../release/${name}.zip" .
          cd -
        done

    - name: Create Release (tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate changelog
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -n "$LATEST_TAG" ]; then
          CHANGELOG=$(git log "${LATEST_TAG}"..HEAD --pretty=format:"- %s (%h)")
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)")
        fi
        echo "$CHANGELOG" > /tmp/changelog.txt

    - name: Create Release (main merge)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build (${{ github.sha }})
        body_path: /tmp/changelog.txt
        files: release/*
        draft: false
        prerelease: true
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
